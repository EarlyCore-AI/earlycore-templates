AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  EarlyCore RAG Agent - Secrets Manager.
  Creates secrets for EarlyCore API key, agent configuration (LLM keys, DB
  connection), and optional additional keys. All secrets are namespaced by
  client and environment.

Parameters:
  ClientName:
    Type: String
    Description: Client identifier for resource naming and secret namespacing.

  Environment:
    Type: String
    Description: Deployment environment.

  EarlycoreApiKey:
    Type: String
    Description: EarlyCore platform API key.
    NoEcho: true

Resources:
  # ---------------------------------------------------------------------------
  # KMS key dedicated to Secrets Manager encryption
  # ---------------------------------------------------------------------------
  SecretsManagerKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "KMS CMK for ${ClientName} ${Environment} Secrets Manager secrets"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAccountRoot
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"

  SecretsManagerKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ClientName}-${Environment}-secrets"
      TargetKeyId: !Ref SecretsManagerKmsKey

  # ---------------------------------------------------------------------------
  # EarlyCore API Key Secret
  # ---------------------------------------------------------------------------
  EarlycoreApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ClientName}/${Environment}/earlycore-api-key"
      Description: !Sub "EarlyCore platform API key for ${ClientName} ${Environment}"
      SecretString: !Ref EarlycoreApiKey
      KmsKeyId: !GetAtt SecretsManagerKmsKey.Arn
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-earlycore-api-key"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

  # ---------------------------------------------------------------------------
  # Agent Configuration Secret
  # Populated after deployment with LLM API key, vector store URL, etc.
  # ---------------------------------------------------------------------------
  AgentConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ClientName}/${Environment}/agent-config"
      Description: !Sub "Agent runtime configuration (LLM keys, DB connection) for ${ClientName} ${Environment}. Populate after stack creation."
      SecretString: '{"llm_api_key":"REPLACE_AFTER_DEPLOYMENT","vectorstore_url":"REPLACE_AFTER_DEPLOYMENT"}'
      KmsKeyId: !GetAtt SecretsManagerKmsKey.Arn
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-agent-config"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

  # ---------------------------------------------------------------------------
  # Additional Keys Secret (optional, for third-party integrations)
  # ---------------------------------------------------------------------------
  AdditionalKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ClientName}/${Environment}/additional-keys"
      Description: !Sub "Additional API keys and credentials for ${ClientName} ${Environment}. Populate as needed."
      SecretString: '{"placeholder":"no-additional-keys-configured"}'
      KmsKeyId: !GetAtt SecretsManagerKmsKey.Arn
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-additional-keys"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

  # ---------------------------------------------------------------------------
  # Redis Auth Token Secret
  # Used by ElastiCache AuthToken via dynamic reference in cache stack.
  # ---------------------------------------------------------------------------
  RedisAuthTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ClientName}/${Environment}/redis-auth-token"
      Description: !Sub "Redis AUTH token for ${ClientName} ${Environment} ElastiCache"
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: auth_token
        PasswordLength: 32
        ExcludePunctuation: true
      KmsKeyId: !GetAtt SecretsManagerKmsKey.Arn
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-redis-auth-token"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

Outputs:
  EarlycoreApiKeySecretArn:
    Description: ARN of the EarlyCore API key secret.
    Value: !Ref EarlycoreApiKeySecret
    Export:
      Name: !Sub "${ClientName}-${Environment}-EarlycoreApiKeySecretArn"

  AgentConfigSecretArn:
    Description: ARN of the agent configuration secret.
    Value: !Ref AgentConfigSecret
    Export:
      Name: !Sub "${ClientName}-${Environment}-AgentConfigSecretArn"

  AdditionalKeysSecretArn:
    Description: ARN of the additional keys secret.
    Value: !Ref AdditionalKeysSecret
    Export:
      Name: !Sub "${ClientName}-${Environment}-AdditionalKeysSecretArn"

  RedisAuthTokenSecretArn:
    Description: ARN of the Redis auth token secret.
    Value: !Ref RedisAuthTokenSecret
    Export:
      Name: !Sub "${ClientName}-${Environment}-RedisAuthTokenSecretArn"

  SecretsArnPrefix:
    Description: ARN prefix for all secrets in this stack (for IAM scoping).
    Value: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ClientName}/${Environment}/"
    Export:
      Name: !Sub "${ClientName}-${Environment}-SecretsArnPrefix"
