AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  EarlyCore RAG Agent - ECS Compute.
  Creates ECS Fargate cluster, task definition with agent and sidecar containers,
  ECS service, ALB, target group, listener, and auto-scaling policies.

Parameters:
  ClientName:
    Type: String
    Description: Client identifier for resource naming.

  Environment:
    Type: String
    Description: Deployment environment.

  VpcId:
    Type: String
    Description: VPC ID.

  PublicSubnetIds:
    Type: CommaDelimitedList
    Description: Comma-separated public subnet IDs for ALB.

  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: Comma-separated private subnet IDs for ECS tasks.

  ALBSecurityGroupId:
    Type: String
    Description: Security group ID for the ALB.

  ECSSecurityGroupId:
    Type: String
    Description: Security group ID for ECS tasks.

  TaskExecutionRoleArn:
    Type: String
    Description: ARN of the ECS task execution role.

  TaskRoleArn:
    Type: String
    Description: ARN of the ECS task role.

  AgentImageUri:
    Type: String
    Description: Container image URI for the RAG agent.

  SidecarImageUri:
    Type: String
    Description: Container image URI for the EarlyCore sidecar.

  ContainerCpu:
    Type: Number
    Description: Fargate CPU units.
    Default: 512

  ContainerMemory:
    Type: Number
    Description: Fargate memory in MB.
    Default: 1024

  DesiredCount:
    Type: Number
    Description: Desired number of ECS tasks.
    Default: 2

  MaxCount:
    Type: Number
    Description: Maximum number of ECS tasks for auto-scaling.
    Default: 10

  AgentLogGroupName:
    Type: String
    Description: CloudWatch log group name for agent container.

  SidecarLogGroupName:
    Type: String
    Description: CloudWatch log group name for sidecar container.

  EarlycoreApiKeySecretArn:
    Type: String
    Description: ARN of the EarlyCore API key secret.

  AgentConfigSecretArn:
    Type: String
    Description: ARN of the agent configuration secret.

  DocumentBucketName:
    Type: String
    Description: S3 bucket name for documents.

  DatabaseEndpoint:
    Type: String
    Description: RDS endpoint (empty if not using managed database).
    Default: ""

  CacheEndpoint:
    Type: String
    Description: ElastiCache endpoint (empty if not using managed cache).
    Default: ""

Resources:
  # ---------------------------------------------------------------------------
  # ECS Cluster
  # ---------------------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ClientName}-${Environment}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-cluster"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------------------
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ClientName}-${Environment}-alb"
      Type: application
      Scheme: internet-facing
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroupId
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "60"
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - Key: deletion_protection.enabled
          Value: "true"
        - Key: access_logs.s3.enabled
          Value: "true"
        - Key: access_logs.s3.bucket
          Value: !Sub "${ClientName}-alb-access-logs-${AWS::AccountId}"
        - Key: access_logs.s3.prefix
          Value: !Sub "${ClientName}/${Environment}"
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-alb"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ClientName}-${Environment}-tg"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 8443
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckPort: "8443"
      HealthCheckIntervalSeconds: 15
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "false"
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-tg"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      # Note: CertificateArn must be added manually or via parameter
      # when deploying with a real domain and ACM certificate.
      # Certificates:
      #   - CertificateArn: !Ref CertificateArn

  # ---------------------------------------------------------------------------
  # ECS Task Definition
  # ---------------------------------------------------------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ClientName}-${Environment}-agent"
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      TaskRoleArn: !Ref TaskRoleArn
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        # --- Agent Container ---
        - Name: agent
          Image: !Ref AgentImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "8080"
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: S3_BUCKET
              Value: !Ref DocumentBucketName
            - Name: DATABASE_ENDPOINT
              Value: !Ref DatabaseEndpoint
            - Name: CACHE_ENDPOINT
              Value: !Ref CacheEndpoint
          Secrets:
            - Name: AGENT_CONFIG
              ValueFrom: !Ref AgentConfigSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AgentLogGroupName
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: agent
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:8080/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

        # --- Sidecar Container ---
        - Name: earlycore-sidecar
          Image: !Ref SidecarImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8443
              Protocol: tcp
          Environment:
            - Name: UPSTREAM_URL
              Value: "http://localhost:8080"
            - Name: LISTEN_PORT
              Value: "8443"
            - Name: ENVIRONMENT
              Value: !Ref Environment
          Secrets:
            - Name: EARLYCORE_API_KEY
              ValueFrom: !Ref EarlycoreApiKeySecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref SidecarLogGroupName
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: sidecar
          DependsOn:
            - ContainerName: agent
              Condition: HEALTHY
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-task-def"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

  # ---------------------------------------------------------------------------
  # ECS Service
  # ---------------------------------------------------------------------------
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: HTTPSListener
    Properties:
      ServiceName: !Sub "${ClientName}-${Environment}-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ECSSecurityGroupId
      LoadBalancers:
        - ContainerName: earlycore-sidecar
          ContainerPort: 8443
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      EnableExecuteCommand: true
      PropagateTags: TASK_DEFINITION
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-${Environment}-service"
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: !Ref ClientName
        - Key: ManagedBy
          Value: earlycore

  # ---------------------------------------------------------------------------
  # Auto-Scaling
  # ---------------------------------------------------------------------------
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref MaxCount
      MinCapacity: !Ref DesiredCount
      ResourceId: !Sub "service/${ECSCluster}/${ECSService.Name}"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"

  CPUScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ClientName}-${Environment}-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 65.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  RequestCountScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ClientName}-${Environment}-request-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          ResourceLabel: !Sub
            - "${ALBFullName}/${TGFullName}"
            - ALBFullName: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
              TGFullName: !GetAtt TargetGroup.TargetGroupFullName
        TargetValue: 100.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ClusterName:
    Description: ECS cluster name.
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${ClientName}-${Environment}-ClusterName"

  ClusterArn:
    Description: ECS cluster ARN.
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub "${ClientName}-${Environment}-ClusterArn"

  ServiceName:
    Description: ECS service name.
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub "${ClientName}-${Environment}-ServiceName"

  LoadBalancerDNS:
    Description: ALB DNS name.
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${ClientName}-${Environment}-LoadBalancerDNS"

  LoadBalancerArn:
    Description: ALB ARN.
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub "${ClientName}-${Environment}-LoadBalancerArn"

  TargetGroupArn:
    Description: Target group ARN.
    Value: !Ref TargetGroup
    Export:
      Name: !Sub "${ClientName}-${Environment}-TargetGroupArn"
