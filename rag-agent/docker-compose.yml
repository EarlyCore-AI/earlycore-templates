services:
  agent:
    build: ./agent
    ports:
      - "8080:8080"
    env_file: .env
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    tmpfs:
      - /tmp:size=64M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - earlycore

  # EarlyCore security sidecar — guardrails + telemetry proxy
  # Local dev: builds from ./sidecar (Python FastAPI)
  # Production: replace with image: ghcr.io/earlycore/sidecar:latest
  earlycore-sidecar:
    build: ./sidecar
    ports:
      - "8443:8443"
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    tmpfs:
      - /tmp:size=16M
    environment:
      - EARLYCORE_API_KEY=${EARLYCORE_API_KEY:-not-set}
      - EARLYCORE_ENDPOINT=${EARLYCORE_ENDPOINT:-https://api.earlycore.dev}
      - UPSTREAM_URL=http://agent:8080
      - CLIENT_NAME=${CLIENT_NAME}
      - MODEL_NAME=${MODEL_NAME}
      - PROVIDER=${PROVIDER}
      - REGION=${REGION}
      - GUARDRAIL_LEVEL=${GUARDRAIL_LEVEL}
      - BLOCK_INJECTION=${BLOCK_INJECTION:-true}
      - BLOCK_PII=${BLOCK_PII:-true}
      - CHECK_GROUNDEDNESS=${CHECK_GROUNDEDNESS:-true}
      - FAIL_OPEN=${FAIL_OPEN:-true}
      - LOCAL_PII=${LOCAL_PII:-true}
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-true}
    volumes:
      - ./earlycore.yaml:/config/earlycore.yaml:ro
    depends_on:
      - agent
    networks:
      - earlycore
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8443/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    tmpfs:
      - /data:size=64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - earlycore

  postgres:
    image: pgvector/pgvector:pg16
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-earlycore}
      POSTGRES_USER: ${POSTGRES_USER:-earlycore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-earlycore_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earlycore"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - earlycore

volumes:
  pgdata:

networks:
  earlycore:
    driver: bridge
